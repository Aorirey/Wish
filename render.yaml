services:
  - type: web
    name: wishly
    runtime: node
    plan: free
    region: frankfurt
    # Build: только зависимости + генерация Prisma Client + билд Next.
    # МИГРАЦИЮ и SEED намеренно НЕ делаем здесь — к этому моменту Postgres
    # может ещё не быть готов (особенно на первом blueprint-деплое).
    buildCommand: npm ci --include=dev && npm run build
    # Start: сначала ждём БД, применяем схему и сид, потом поднимаем Next.
    # См. scripts/start.js
    startCommand: node scripts/start.js
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: wishly-db
          property: connectionString

databases:
  - name: wishly-db
    databaseName: wishly
    plan: free
    region: frankfurt
